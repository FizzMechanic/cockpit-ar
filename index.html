<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AR Viewer Pro</title>
<link rel="stylesheet" href="style.css">
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
</head>
<body>
<div id="loader"><div><h2>Chargement…</h2><div class="bar"><div id="progress"></div></div></div></div>

<model-viewer id="viewer"
src="cockpit_sceneviewer.glb"
camera-controls
touch-action="pan-y"
ar
ar-modes="scene-viewer webxr quick-look"
shadow-intensity="1"
shadow-softness="1"
environment-image="neutral"
exposure="1.1"
style="width:100%;height:100vh;background:transparent;">
<button slot="ar-button" id="arButton">📱 Voir dans ma pièce</button>
</model-viewer>

<div class="panel">
<h1>AR Viewer Pro</h1>
<p id="dims">Dimensions : analyse…</p>
<div class="buttons">
<button id="reset">🔄 Réinitialiser</button>
<button id="fullscreen">⛶ Plein écran</button>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
